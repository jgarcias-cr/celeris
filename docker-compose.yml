version: '3.8'
services:
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    image: celeris2-php:8.4
    volumes:
      - ./:/var/www/html
    working_dir: /var/www/html
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
    expose:
      - "9000"
    depends_on:
      - db

  web:
    image: nginx:stable
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8081:8081"
      - "8082:8082"
    depends_on:
      - app

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: celeris
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
